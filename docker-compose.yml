services:
  postgres:
    image: postgres:16
    container_name: edumateDB
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edumate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=all"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edumate"]
      interval: 5s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
  backend:
    build: ../backend
    env_file:
      - ../backend/.env
    container_name: spring-edumate-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  nlp-service:
    build:
      context: ../nlp-service
    environment:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"

  frontend:
    build: ../frontend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  pgadmin_data:
